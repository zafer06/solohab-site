{{ define "main" }}
    <section id="blogSingle" class="py-12">
        <div class="max-w-4xl mx-auto px-6">
            <article class="content-wrapper">
                <h1 class="text-3xl md:text-5xl font-extrabold text-slate-900 mb-8 border-b pb-4">
                    {{ .Title }}
                </h1>
                
                <div class="prose prose-slate max-w-none 
                            [&_p]:text-slate-600 [&_p]:leading-relaxed [&_p]:mb-6
                            [&_h2]:text-2xl [&_h2]:font-bold [&_h2]:text-slate-900 [&_h2]:mt-10 [&_h2]:mb-4
                            [&_h3]:text-xl [&_h3]:font-semibold [&_h3]:text-slate-800 [&_h3]:mt-8 [&_h3]:mb-3
                            [&_h4]:text-lg [&_h4]:font-medium [&_h4]:text-slate-800 [&_h4]:mt-6 [&_h4]:mb-2
                            [&_ul]:list-disc [&_ul]:pl-5 [&_ul]:mb-6 [&_li]:mb-2 [&_li]:text-slate-600
                            [&_img]:rounded-2xl [&_img]:border [&_img]:border-slate-200 [&_img]:shadow-sm [&_img]:my-8">
                    {{ .Content }}
                </div>
            </article>
        </div>
    </section>
{{ end }}
