{{ define "main" }}
<section id="blogList" class="py-8">
    <div class="px-6 max-w-7xl mx-auto">
        <div class="mb-6">
            <span
                class="inline-block py-1.5 px-5 text-sm font-bold tracking-wide text-slate-700 rounded-full border border-slate-200 bg-red-50">
                Solohab Blog
            </span>
        </div>

        <div class="gap-4 mb-6">
            <div class="gap-4">
                <h1 class="text-4xl md:text-6xl font-bold tracking-tight text-slate-900">
                    E-Ticaret Stratejileri
                </h1>
            </div>
        </div>

        <p class="text-lg md:text-xl text-slate-600 leading-relaxed max-w-2xl">
            Satışlarınızı artıracak <strong>global trendler</strong> ve <strong>e-ticaret</strong> dünyasından güncel
            içgörülerle işinizi bir adım öne taşıyın.
        </p>

        <hr>
    </div>

    <div class="max-w-7xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

            {{ range .Pages }}
            <article class="flex">
                <a href="{{ .RelPermalink }}"
                    class="group w-full block rounded-3xl p-4 border border-slate-100 transition-all duration-300 hover:shadow-xl hover:shadow-red-100/50 hover:-translate-y-1 flex flex-col">

                    <div class="relative aspect-video overflow-hidden rounded-2xl">
                        <img src="{{ .Params.image | default "/img/pic1.jpg" }}" alt="{{ .Title }}"
                            class="object-cover w-full h-full transition-transform duration-500 group-hover:scale-105">
                    </div>

                    <div class="mt-5 px-1 flex-grow">
                        <div class="flex items-center gap-2 text-xs font-medium text-slate-500 mb-3">
                            <span>{{ .Date.Format "02 Jan 2006" }}</span>
                            <span class="w-1 h-1 rounded-full bg-slate-300"></span>
                            <span>{{ .ReadingTime }} dk okuma</span>
                        </div>

                        <h3
                            class="text-xl font-bold text-slate-900 leading-snug group-hover:text-brand transition-colors">
                            {{ .Title }}
                        </h3>
                    </div>
                </a>
            </article>
            {{ end }}

        </div>
    </div>
</section>
{{ end }}
